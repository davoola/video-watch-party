<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>聊天 - 私密影院</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body data-title-prefix="聊天">
  <div class="topbar">
    <a href="/index.html" class="back-link">← 返回视频库</a>
    <div class="user-area">
      <span id="meText"></span>
      <span id="presenceText"></span>
    </div>
  </div>

  <div class="chat-standalone">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="emoji-picker" id="emojiPicker" hidden></div>
    <div class="chat-input-area">
      <div class="chat-toolbar-row">
        <button class="icon-btn" id="emojiBtn" title="表情" type="button">😊</button>
        <button class="icon-btn" id="imageBtn" title="发送图片" type="button">🖼️</button>
        <input type="file" id="imageInput" accept="image/png,image/jpeg,image/gif,image/webp" hidden>
      </div>
      <div class="chat-send-row">
        <textarea id="chatInput" placeholder="说点什么..." maxlength="2000" rows="1"></textarea>
        <button id="sendBtn">发送</button>
      </div>
      <div class="chat-input-hint">支持完整 Markdown · Shift+Enter 换行</div>
    </div>
  </div>

  <script src="/js/siteConfig.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/markdown.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
